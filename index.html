<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google World Cup Doodle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="homepage-container">
        <!-- Main Dark Rounded Doodle Card Box -->
        <div class="doodle-card-container">
            <div class="doodle-layout-wrapper">
                
                <!-- Logo Row -->
                <div class="doodle-content">
                    <span class="doodle-text">G</span>
                    <div class="soccer-animation-box">
                        <img src="frame1.png" class="f1" alt="Elephant with ball">
                        <img src="frame2.png" class="f2" alt="Player kicking">
                        <img src="frame3.png" class="f3" alt="Fireball soccer shot">
                        <img src="frame4.png" class="f4" alt="Elephant balancing ball">
                    </div>
                    <span class="doodle-text">gle</span>
                </div>

                <!-- Synchronized Stylish Banner Text -->
                <div class="doodle-banner">Happy FIFA World Cup Tournament</div>
            </div>
        </div>

        <!-- Modern White Search Bar Layout with Icons -->
        <form class="search-bar-wrapper" action="https://google.com" method="GET">
            <span class="plus-icon">+</span>
            <input type="text" name="q" placeholder="Ask Google" autocomplete="off">
            
            <div class="search-icons-group">
                <svg class="search-svg" viewBox="0 0 24 24"><path fill="#5f6368" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                <svg class="search-svg" viewBox="0 0 24 24"><path fill="#5f6368" d="M19.3 16.9c.4-.7.7-1.5.7-2.4 0-2.2-1.8-4-4-4s-4 1.8-4 4 1.8 4 4 4c.9 0 1.7-.3 2.4-.7l3.2 3.2 1.4-1.4-3.3-3.1zm-3.3.6c-1.4 0-2.5-1.1-2.5-2.5s1.1-2.5 2.5-2.5 2.5 1.1 2.5 2.5-1.1 2.5-2.5 2.5zM12 21H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v7h-2V5H5v14h7v2z"/></svg>
                <div class="ai-capsule">
                    <svg class="ai-sparkle-svg" viewBox="0 0 24 24"><path fill="#1f1f1f" d="M9 21c-.5 0-.9-.4-.9-.9v-4.2l-3.2-3.2c-.4-.4-.4-1 0-1.4l8.3-8.3c.4-.4 1-.4 1.4 0l3.2 3.2h4.2c.5 0 .9.4.9.9v4.2l3.2 3.2c.4.4.4 1 0 1.4l-8.3 8.3c-.2.2-.4.3-.7.3zm2-15.6L4.4 12 11 18.6l6.6-6.6L11 5.4z"/></svg>
                    <span>AI Mode</span>
                </div>
            </div>
        </form>

        <!-- NEW: Shortcut link badges row -->
        <div class="shortcuts-container">
            <a href="https://youtube.com" class="shortcut-item" target="_blank">
                <div class="shortcut-icon icon-yt">YT</div>
                <span class="shortcut-label">YouTube</span>
            </a>
            <a href="https://github.com" class="shortcut-item" target="_blank">
                <div class="shortcut-icon icon-gh">GH</div>
                <span class="shortcut-label">GitHub</span>
            </a>
            <a href="https://wikipedia.org" class="shortcut-item" target="_blank">
                <div class="shortcut-icon icon-wp">WP</div>
                <span class="shortcut-label">Wikipedia</span>
            </a>
        </div>
    </div>
</body>
</html>
